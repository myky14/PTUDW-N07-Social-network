<!DOCTYPE html>
<html>
<head>
    <title>Layout Trang Chủ</title>
    <meta charset="UTF-8">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid">

    <!-- HEADER -->
    <div class="row">
        <div class="col-12 bg-dark text-center" style="height: 80px;">
            HEADER
        </div>
    </div>

    <!-- MAIN -->
    <div class="row mt-3">

        <!-- LEFT -->
        <div class="col-md-2">
            <div class="bg-light p-3 mb-3" style="min-height: 200px;">
                <h5>MENU</h5>
            </div>

            <div class="bg-light p-3" style="min-height: 200px;">
                <h5>VIBE</h5>
            </div>
        </div>

        <!-- CENTER -->
        <div class="col-md-7 bg-white" style="min-height: 400px;">
            MAIN CONTENT
        </div>

        <!-- RIGHT -->
        <div class="col-md-3">
            <div class="bg-light p-3 mb-3" style="min-height: 300px;">
                <h5>GỢI Ý</h5>
            </div>

            <div class="bg-light p-3" style="min-height: 100px;">
                <h5>TOPIC</h5>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="row mt-3">
        <div class="col-12 bg-dark text-center" style="height: 200px;">
            FOOTER
        </div>
    </div>

</div>

</body>
</html>
